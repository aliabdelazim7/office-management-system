packages:
  - 'apps/*'
  - 'packages/*'

# Build scripts are opt-in. Only packages that genuinely need a postinstall
# step are approved here — everything else installs without executing code.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  '@nestjs/core': true
  '@scarf/scarf': false
